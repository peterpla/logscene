{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .Title}}{{.Title}} — {{end}}LogScene</title>
  <link href="/static/css/bootstrap.min.css" rel="stylesheet">
  <script src="/static/js/htmx.min.js" defer></script>
  <style>
    body { min-height: 100vh; }
    .sidebar { width: 220px; min-height: 100vh; flex-shrink: 0; }
    .sidebar .nav-link { color: rgba(255,255,255,.75); }
    .sidebar .nav-link:hover { color: #fff; }
    .sidebar .nav-link.active { color: #fff; background-color: rgba(255,255,255,.15); }
  </style>
</head>
<body class="d-flex bg-light">

  <!-- Dark sidebar -->
  <nav class="sidebar d-flex flex-column p-3 bg-dark text-white">
    <a href="/" class="d-flex align-items-center mb-3 text-white text-decoration-none">
      <span class="fs-5 fw-semibold">LogScene</span>
    </a>
    <hr class="border-secondary">
    <ul class="nav nav-pills flex-column mb-auto gap-1">
      <li class="nav-item">
        <a href="/" class="nav-link{{if eq .Page "dashboard"}} active{{end}}">Dashboard</a>
      </li>
      <li class="nav-item">
        <a href="/new" class="nav-link{{if eq .Page "new-webcam"}} active{{end}}">Add Webcam</a>
      </li>
      <li class="nav-item">
        <a href="/logs" class="nav-link{{if eq .Page "logs"}} active{{end}}">Logs</a>
      </li>
    </ul>
    <hr class="border-secondary">
    <small class="text-secondary">&copy; 2026 LogScene</small>
  </nav>

  <!-- Main content area -->
  <main class="flex-grow-1 p-4 overflow-auto">
    {{block "content" .}}{{end}}
  </main>

  <script src="/static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{end}}
