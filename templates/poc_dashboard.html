{{define "content"}}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h5 class="mb-0">Dashboard</h5>
  <a href="/new" class="btn btn-primary btn-sm">+ Add Webcam</a>
</div>

<div class="row g-3">
  <div class="col-12 col-md-6 col-xl-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start mb-1">
          <h6 class="card-title mb-0">Front Yard</h6>
          <span class="badge bg-success">Active</span>
        </div>
        <p class="text-muted small mb-1">Next capture: 2:15 PM</p>
        <p class="text-muted small mb-3">12 captures today</p>
        <button class="btn btn-sm btn-outline-secondary" disabled
                title="Add captures before rendering">Render</button>
      </div>
    </div>
  </div>
</div>
{{end}}
